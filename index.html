<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EYPH — Earn Your Phase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════ -->
  <header class="app-header" role="banner">
    <div class="header-brand">EYPH</div>
    <div class="header-clock" id="clock" aria-live="polite" aria-label="Current time">00:00:00</div>
    <nav class="header-actions" aria-label="Primary actions">
      <div class="sync-status" id="sync-status" aria-live="polite" title="Database sync status">
        <span class="sync-dot" id="sync-dot"></span>
        <span class="sync-label" id="sync-label">CONNECTING</span>
      </div>
      <button class="btn btn-ghost" id="btn-export" aria-label="Export data as JSON" title="Export to JSON">⬇ EXPORT</button>
      <button class="btn btn-ghost" id="btn-open-okr-modal" aria-label="Create new OKR">+ OKR</button>
      <button class="btn btn-accent" id="btn-open-kpi-modal" aria-label="Create new KPI">+ KPI</button>
    </nav>
  </header>

  <!-- ═══════════════════════════════════════════════
       MAIN WORKSPACE
  ═══════════════════════════════════════════════ -->
  <main class="workspace" role="main">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" aria-label="OKR and KPI list">
      <div class="sidebar-header">
        <span class="sidebar-title">ACTIVE OKRs</span>
        <button class="btn btn-ghost btn-sm" id="btn-open-focus-modal" aria-label="Change focus KPI">⚡ CHANGE FOCUS</button>
      </div>
      <div class="sidebar-list" id="okr-list" role="list" aria-label="OKR list">
        <!-- Populated by JS -->
      </div>
    </aside>

    <!-- RIGHT FOCUS PANEL -->
    <section class="focus-panel" id="focus-panel" aria-label="Active KPI focus panel">
      <!-- Populated by JS -->
    </section>

  </main>

  <!-- ═══════════════════════════════════════════════
       MODAL: CREATE OKR
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-okr" role="dialog" aria-modal="true" aria-labelledby="modal-okr-title" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-okr-title">NEW OBJECTIVE</h2>
        <button class="modal-close" data-close="modal-okr" aria-label="Close modal">✕</button>
      </div>
      <form class="modal-form" id="form-okr" novalidate>
        <div class="form-group">
          <label for="okr-title" class="form-label">OBJECTIVE TITLE</label>
          <input type="text" id="okr-title" class="form-input" placeholder="What are you trying to achieve?" maxlength="120" required />
          <span class="form-error" id="okr-title-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="okr-deadline" class="form-label">DEADLINE</label>
          <input type="date" id="okr-deadline" class="form-input" required />
          <span class="form-error" id="okr-deadline-error" role="alert"></span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close="modal-okr">CANCEL</button>
          <button type="submit" class="btn btn-accent">CREATE OKR</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       MODAL: CREATE KPI
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-kpi" role="dialog" aria-modal="true" aria-labelledby="modal-kpi-title" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-kpi-title">NEW KPI</h2>
        <button class="modal-close" data-close="modal-kpi" aria-label="Close modal">✕</button>
      </div>
      <form class="modal-form" id="form-kpi" novalidate>
        <div class="form-group">
          <label for="kpi-okr" class="form-label">ATTACH TO OKR</label>
          <select id="kpi-okr" class="form-input form-select" required>
            <option value="">— Select OKR —</option>
          </select>
          <span class="form-error" id="kpi-okr-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="kpi-title" class="form-label">KPI TITLE</label>
          <input type="text" id="kpi-title" class="form-input" placeholder="What is the measurable result?" maxlength="100" required />
          <span class="form-error" id="kpi-title-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label class="form-label">TYPE</label>
          <div class="type-toggle" role="group" aria-label="KPI type">
            <button type="button" class="type-btn active" data-type="hours">HOURS</button>
            <button type="button" class="type-btn" data-type="tasks">TASKS</button>
          </div>
          <input type="hidden" id="kpi-type" value="hours" />
        </div>
        <div class="form-group" id="kpi-target-group">
          <label for="kpi-target" class="form-label">TARGET HOURS</label>
          <input type="number" id="kpi-target" class="form-input" placeholder="e.g. 40" min="1" max="10000" required />
          <span class="form-error" id="kpi-target-error" role="alert"></span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close="modal-kpi">CANCEL</button>
          <button type="submit" class="btn btn-accent">CREATE KPI</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       MODAL: CHANGE FOCUS
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-focus" role="dialog" aria-modal="true" aria-labelledby="modal-focus-title" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-focus-title">SELECT FOCUS</h2>
        <button class="modal-close" data-close="modal-focus" aria-label="Close modal">✕</button>
      </div>
      <div id="focus-list" class="focus-select-list" role="list">
        <!-- Populated by JS -->
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" data-close="modal-focus">CANCEL</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       MODAL: ADD TASK
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-task" role="dialog" aria-modal="true" aria-labelledby="modal-task-title" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-task-title">ADD TASK</h2>
        <button class="modal-close" data-close="modal-task" aria-label="Close modal">✕</button>
      </div>
      <form class="modal-form" id="form-task" novalidate>
        <div class="form-group">
          <label for="task-title" class="form-label">TASK DESCRIPTION</label>
          <input type="text" id="task-title" class="form-input" placeholder="Define the specific action..." maxlength="120" required />
          <span class="form-error" id="task-title-error" role="alert"></span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close="modal-task">CANCEL</button>
          <button type="submit" class="btn btn-accent">ADD TASK</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       MODAL: RENAME (shared for OKR / KPI / Task)
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-rename" role="dialog" aria-modal="true" aria-labelledby="modal-rename-title" hidden>
    <div class="modal-box modal-box--sm">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-rename-title">RENAME</h2>
        <button class="modal-close" data-close="modal-rename" aria-label="Close modal">✕</button>
      </div>
      <form class="modal-form" id="form-rename" novalidate>
        <div class="form-group">
          <label for="rename-input" class="form-label" id="rename-label">NEW NAME</label>
          <input type="text" id="rename-input" class="form-input" maxlength="120" required />
          <span class="form-error" id="rename-error" role="alert"></span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close="modal-rename">CANCEL</button>
          <button type="submit" class="btn btn-accent">SAVE</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       CONFIRM DIALOG
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-confirm" role="dialog" aria-modal="true" aria-labelledby="modal-confirm-title" hidden>
    <div class="modal-box modal-box--sm">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-confirm-title">CONFIRM DELETE</h2>
      </div>
      <p class="confirm-message" id="confirm-message"></p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" data-close="modal-confirm">CANCEL</button>
        <button type="button" class="btn btn-danger" id="btn-confirm-delete">DELETE</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
